# HTR preprocessing consumer (Phase 2).
#
# Topology (Path A integration with Palomarr/paperless-ml):
#   - ml-gateway, paperless-web, minio, redpanda live in the paperless-ml stack.
#     Reachable on shared external network `paperless_ml_net`, which
#     paperless-ml joins via its docker-compose.shared.yml overlay.
#   - Our postgres (for documents / document_pages / handwritten_regions)
#     stays in REDES01/paperless_data on network `paperless_data_default`.
#
# Usage (from paperless_data_integration/):
#
#   # One-time: create shared network and bring up both backing stacks
#   ../paperless_ml/scripts/create_network.sh
#   (cd ../paperless_ml && docker compose \
#        -f docker-compose.yml -f docker-compose.shared.yml up -d)
#   (cd ../paperless_data && docker compose -p paperless_data up -d)
#
#   # Paperless API token (see notebook Step 16)
#   export PAPERLESS_TOKEN=<token>
#
#   # Start this consumer
#   docker compose -f htr_consumer/compose.yml up -d --build
#
#   docker compose -f htr_consumer/compose.yml logs -f
#   docker compose -f htr_consumer/compose.yml down

services:
  htr_consumer:
    build:
      context: ..    # paperless_data_integration root, so Dockerfile can COPY region_slicer/*
      dockerfile: htr_consumer/Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_BROKER: redpanda:9092
      KAFKA_TOPIC: paperless.uploads
      KAFKA_GROUP_ID: htr-preprocessing

      # paperless-ml's ml-gateway; DNS alias `fastapi_server` is set on the
      # shared network by paperless-ml/docker-compose.shared.yml.
      FASTAPI_URL: http://fastapi_server:8000
      # paperless-ml renamed the endpoint to /htr (matches architecture doc
      # line 636). Override HTR_ENDPOINT=/predict/htr if targeting an older
      # serving deploy.
      HTR_ENDPOINT: /htr

      # paperless-ml's paperless-web; DNS alias `paperless-webserver-1` set
      # on the shared network so the default URL keeps working.
      PAPERLESS_URL: http://paperless-webserver-1:8000
      PAPERLESS_TOKEN: ${PAPERLESS_TOKEN:?PAPERLESS_TOKEN env var is required}

      # paperless-ml's minio; dev defaults are minioadmin / minioadmin.
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: paperless-images

      # Our data-role postgres in REDES01/paperless_data, reached via the
      # paperless_data stack's default network, not the shared net.
      ML_DB_HOST: postgres
      ML_DB_PORT: "5432"
      ML_DB_NAME: paperless
      ML_DB_USER: user
      ML_DB_PASSWORD: paperless_postgres

      # Drift monitor — fire-and-forget POST per region. Leave blank to disable.
      DRIFT_MONITOR_URL: http://drift_monitor:8000
      DRIFT_MONITOR_TIMEOUT_SECONDS: "2.0"

      LOG_LEVEL: INFO
    networks:
      - paperless_ml_net          # reach paperless-ml services
      - paperless_data_default    # reach our postgres

networks:
  paperless_ml_net:
    external: true
  paperless_data_default:
    external: true
    name: paperless_data_default
