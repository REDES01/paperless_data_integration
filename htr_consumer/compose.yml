# HTR preprocessing consumer (Phase 2).
#
# Topology:
#   - paperless_ml_net is the shared external network that paperless-web,
#     ml_gateway, minio, redpanda, drift_monitor all attach to.
#   - The data-stack postgres lives on the `paperless_data_default` network;
#     we attach to both so we can reach it for writes.
#
# Usage (from paperless_data_integration/):
#
#   # Paperless API token — see provision_chameleon.ipynb step 16
#   export PAPERLESS_TOKEN=<token>
#
#   # Start this consumer
#   docker compose -f htr_consumer/compose.yml up -d --build
#   docker compose -f htr_consumer/compose.yml logs -f
#   docker compose -f htr_consumer/compose.yml down

services:
  htr_consumer:
    build:
      context: ..
      dockerfile: htr_consumer/Dockerfile
    container_name: htr_consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC: paperless.uploads
      KAFKA_GROUP_ID: htr-preprocessing

      # Solo-build ml_gateway runs on the shared network as `ml_gateway:8000`.
      # Fall back name fastapi_server is kept as an alias for older configs.
      FASTAPI_URL: http://ml_gateway:8000
      HTR_ENDPOINT: ${HTR_ENDPOINT:-/predict/htr}

      PAPERLESS_URL: http://webserver:8000
      PAPERLESS_TOKEN: ${PAPERLESS_TOKEN:?PAPERLESS_TOKEN env var is required}

      # Matches paperless_data's minio-init seed: admin / paperless_minio.
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: paperless_minio
      MINIO_BUCKET: paperless-images

      # Data-role postgres (REDES01/paperless_data stack).
      ML_DB_HOST: postgres
      ML_DB_PORT: "5432"
      ML_DB_NAME: paperless
      ML_DB_USER: user
      ML_DB_PASSWORD: paperless_postgres

      # Drift monitor — fire-and-forget POST per region. Leave blank to disable.
      DRIFT_MONITOR_URL: http://drift_monitor:8000
      DRIFT_MONITOR_TIMEOUT_SECONDS: "2.0"

      LOG_LEVEL: INFO

      # B1 printed-text filter threshold. Coverage ratio (0.0-1.0) at or above
      # which a region is considered printed and dropped. Higher = more permissive.
      #   0.25  aggressive (may drop mixed-content regions like signatures)
      #   0.50  default balance
      #   0.90  effectively disabled (keep almost everything)
      PRINTED_COVERAGE_THRESHOLD: ${PRINTED_COVERAGE_THRESHOLD:-0.50}
    networks:
      - paperless_ml_net          # reach ml_gateway, minio, redpanda, drift_monitor
      - paperless_data_default    # reach the data-role postgres

networks:
  paperless_ml_net:
    external: true
  paperless_data_default:
    external: true
    name: paperless_data_default
