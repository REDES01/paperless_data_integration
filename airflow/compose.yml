# Airflow compose — minimal single-scheduler LocalExecutor setup.
#
# Services:
#   airflow-postgres   — metadata DB (separate from Paperless's or the data stack's)
#   airflow-init       — one-shot DB migrate + create admin user (admin/admin)
#   airflow-webserver  — UI on :8080
#   airflow-scheduler  — DAG parser + task runner (LocalExecutor = no separate worker)
#
# Bring up:
#   bash scripts/up_airflow.sh
# Tear down (keeping data):
#   docker compose -p airflow -f airflow/compose.yml down
# Wipe everything including DAG state:
#   docker compose -p airflow -f airflow/compose.yml down -v
#
# UI:        http://<vm>:8080          admin / admin
# Health:    http://<vm>:8080/health

x-airflow-common: &airflow-common
  # Build a small custom image that pre-installs apache-airflow-providers-docker
  # at build time (5 sec), instead of doing it at container start every boot
  # via _PIP_ADDITIONAL_REQUIREMENTS (flaky — crash-looped the webserver).
  build:
    context: .
    dockerfile: Dockerfile
  image: paperless-airflow:2.10.4
  # Run as root inside the container so the docker socket mount is usable.
  # Single-tenant demo VM — acceptable posture. For multi-tenant, swap to
  # uid 50000 and add airflow user to the docker group.
  user: "0:0"
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__PARALLELISM: "4"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__WORKERS: "2"
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
    - /var/run/docker.sock:/var/run/docker.sock
  networks:
    - paperless_ml_net
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - paperless_ml_net

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com 2>&1 | grep -v "already exist" || true
        echo "airflow init complete"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}" || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy

volumes:
  airflow_postgres_data:
  airflow_logs:
  airflow_plugins:

networks:
  paperless_ml_net:
    external: true
