# Fine-tune TrOCR-base-printed on user corrections only.
# Core retraining loop: user correction → snapshot → training → gate.
#
# On a fresh system (no user corrections yet), this degrades to FAIL gate
# with reason "no training data loaded" — which is correct behavior.
# Do not register a model that saw zero examples.

run_name: finetune_corrections
role: finetune

training_sources: [corrections]
snapshot_version: latest
max_train_examples: 200
max_val_examples: 100

base_model: microsoft/trocr-base-printed

epochs: 1
batch_size: 2
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_steps: 20
max_new_tokens: 128

device: cpu
eval_batch_size: 4
seed: 42

gate_tolerance: 1.05
register_on_pass: true
register_name: htr
