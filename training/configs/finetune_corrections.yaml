# Fine-tune TrOCR on user corrections only.
# Demonstrates the CORE RETRAINING LOOP: user correction → versioned
# snapshot → training → quality gate → registry.
#
# On a fresh system with no corrections yet, the snapshot loader returns
# an empty list. The trainer's role=finetune check then fails the gate
# with reason "no training data loaded" — which is the CORRECT behavior.
# (We should not register a model that saw zero training examples.)

run_name: finetune_corrections
role: finetune

training_sources: [corrections]
snapshot_version: latest
max_train_examples: 200
max_val_examples: 100

base_model: microsoft/trocr-base-handwritten

epochs: 1
batch_size: 2
learning_rate: 1.0e-6        # gentle LR matching finetune_iam
weight_decay: 0.01
warmup_steps: 20
max_new_tokens: 128

device: cpu
eval_batch_size: 4
seed: 42

gate_tolerance: 1.05
register_on_pass: true
register_name: htr
