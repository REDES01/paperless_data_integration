# Baseline: pretrained TrOCR-base-printed, no fine-tuning.
#
# Model choice rationale:
# We use trocr-base-PRINTED (not trocr-base-handwritten) as the baseline.
# The handwritten variant was trained on IAM, which is our eval set — it's
# already at ceiling and fine-tuning can only perturb. The printed variant
# was trained on SROIE (receipts) so IAM handwriting is genuinely
# out-of-distribution for it. This gives fine-tuning real signal to learn
# from and the quality gate something meaningful to approve/reject.
#
# Also matches a realistic production scenario: start with a general-purpose
# text recognizer, specialize via user corrections.
#
# Runs in ~2 minutes on CPU (eval only).

run_name: baseline_pretrained
role: baseline

training_sources: []
max_train_examples: 0
max_val_examples: 100

base_model: microsoft/trocr-base-printed

# Placeholders — no training for baseline
epochs: 0
batch_size: 2
learning_rate: 0.0
weight_decay: 0.0
warmup_steps: 0
max_new_tokens: 128

device: cpu
eval_batch_size: 4
seed: 42

gate_tolerance: 1.05
register_on_pass: false
register_name: htr
