# Fine-tune TrOCR-base-printed on IAM + user corrections combined.
# Same training budget as finetune_iam (200 IAM + whatever corrections exist).

run_name: finetune_combined
role: finetune

training_sources: [iam, corrections]
snapshot_version: latest
max_train_examples: 200
max_val_examples: 100
iam_split: train

base_model: microsoft/trocr-base-printed

epochs: 1
batch_size: 2
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_steps: 20
max_new_tokens: 128

device: cpu
eval_batch_size: 4
seed: 42

gate_tolerance: 1.15
register_on_pass: true
register_name: htr
