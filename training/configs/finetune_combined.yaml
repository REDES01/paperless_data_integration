# Fine-tune TrOCR on IAM + user corrections combined.
# In a mature production deployment this would be the preferred candidate —
# external dataset provides the broad handwriting prior, user corrections
# adapt to domain-specific documents.
#
# On a fresh system (no corrections yet) this degrades to "finetune_iam
# with extra loader overhead" — IAM loads fine, corrections return [],
# training sees only IAM examples. Same gentle-LR regime as finetune_iam.

run_name: finetune_combined
role: finetune

training_sources: [iam, corrections]
snapshot_version: latest
max_train_examples: 150          # 150 per source; 300 total when both present
max_val_examples: 100
iam_split: train

base_model: microsoft/trocr-base-handwritten

epochs: 1
batch_size: 2
learning_rate: 1.0e-6
weight_decay: 0.01
warmup_steps: 20
max_new_tokens: 128

device: cpu
eval_batch_size: 4
seed: 42

gate_tolerance: 1.05
register_on_pass: true
register_name: htr
