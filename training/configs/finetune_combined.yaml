# Fine-tune TrOCR on IAM + user corrections combined.
# This is the candidate we'd expect to pick in a real production setup —
# the external dataset gives the model a broad handwriting prior, the user
# corrections adapt it to domain-specific documents.
#
# Expected runtime: ~20-25 min on CPU.

run_name: finetune_combined
role: finetune

training_sources: [iam, corrections]
snapshot_version: latest
max_train_examples: 150       # 150 per source → 300 total
max_val_examples: 100
iam_split: train

base_model: microsoft/trocr-base-handwritten

epochs: 1
batch_size: 2
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_steps: 0
max_new_tokens: 128

device: cpu
eval_batch_size: 4
seed: 42

gate_tolerance: 1.05
register_on_pass: true
register_name: htr
