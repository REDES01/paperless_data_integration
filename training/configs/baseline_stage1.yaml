# Baseline: pretrained TrOCR-base-stage1, no fine-tuning.
#
# Why stage1:
# trocr-base-stage1 was pretrained on 684M lines of synthetic PRINTED text
# (the PHD corpus) and has NEVER been fine-tuned on handwriting.
# trocr-base-handwritten is stage1 + IAM fine-tuning by Microsoft.
# By replicating that fine-tuning step ourselves, we:
#   - demonstrate end-to-end training (the course point)
#   - have a meaningful delta to show vs baseline
#   - produce a model that actually works at the end
#
# Runs in ~2 minutes on CPU (eval only).

run_name: baseline_stage1
role: baseline

training_sources: []
max_train_examples: 0
max_val_examples: 200

base_model: microsoft/trocr-base-stage1

# Placeholders — no training for baseline
epochs: 0
batch_size: 4
learning_rate: 0.0
weight_decay: 0.0
warmup_steps: 0
max_new_tokens: 128

device: cpu
eval_batch_size: 4
seed: 42

gate_tolerance: 1.05
register_on_pass: false
register_name: htr
