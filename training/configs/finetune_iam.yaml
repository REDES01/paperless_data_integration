# Fine-tune TrOCR-base-printed on IAM handwriting.
#
# Prior config (200 ex × 1 epoch = 100 steps) got the loss from 10.5 -> 4.1
# but didn't converge enough to beat baseline (CER 1.29 vs baseline 0.81).
# This config gives the model ~5x more training signal.

run_name: finetune_iam
role: finetune

training_sources: [iam]
max_train_examples: 500          # up from 200
max_val_examples: 100
iam_split: train

base_model: microsoft/trocr-base-printed

epochs: 2                         # up from 1  (2 epochs × 500/2 = 500 steps)
batch_size: 2
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_steps: 50                  # ~10% of 500 total steps
max_new_tokens: 128

device: cpu
eval_batch_size: 4
seed: 42

gate_tolerance: 1.05
register_on_pass: true
register_name: htr
