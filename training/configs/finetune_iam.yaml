# Fine-tune TrOCR-base-printed on IAM handwriting.
#
# This is now a REAL adaptation task: the printed-text base model has never
# seen handwriting (trained on SROIE receipts), so IAM is genuinely
# out-of-distribution. Fine-tuning should substantially reduce CER.
#
# Aggressive LR (5e-5) is appropriate here because we actually need the
# model to learn — unlike when fine-tuning an already-optimal checkpoint.
# 200 IAM training examples, batch 2, 1 epoch, CPU: ~20 min.

run_name: finetune_iam
role: finetune

training_sources: [iam]
max_train_examples: 200
max_val_examples: 100
iam_split: train

base_model: microsoft/trocr-base-printed

epochs: 1
batch_size: 2
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_steps: 20
max_new_tokens: 128

device: cpu
eval_batch_size: 4
seed: 42

gate_tolerance: 1.05
register_on_pass: true
register_name: htr
