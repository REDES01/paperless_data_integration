# Fine-tune TrOCR-base-printed on IAM handwriting.
#
# Configuration discovered through iteration:
#   - trocr-base-handwritten would be at ceiling on IAM, no room to improve
#   - trocr-base-printed has never seen handwriting, fine-tuning adds value
#   - 200 training examples, 1 epoch = 100 gradient steps on batch 2
#     is the sweet spot — enough to adapt, not enough to overfit.
#     (500 steps overfit: loss dropped to 1.96 but val_cer blew up to 1.51.)
#   - LR 5e-5 + warmup 20 is the HF-recommended regime for TrOCR fine-tuning.
#
# With torch.manual_seed(seed) now applied in trainer.py, results are
# reproducible across runs.
#
# Expected outcome: val_cer ~0.68, gate PASS (threshold 0.85), registers as htr/v1.
# Runtime: ~20 min on CPU.

run_name: finetune_iam
role: finetune

training_sources: [iam]
max_train_examples: 200
max_val_examples: 100
iam_split: train

base_model: microsoft/trocr-base-printed

epochs: 1
batch_size: 2
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_steps: 20
max_new_tokens: 128

device: cpu
eval_batch_size: 4
seed: 42

gate_tolerance: 1.05
register_on_pass: true
register_name: htr
