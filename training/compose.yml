# Trainer compose — one-shot training containers + recurring scheduler.
#
# Stage1-based runs (recommended for proper fine-tune demo):
#   docker compose -f training/compose.yml run --rm baseline_stage1
#   docker compose -f training/compose.yml run --rm finetune_stage1              # frozen, faster
#   docker compose -f training/compose.yml run --rm finetune_iam_stage1          # unfrozen, better
#   docker compose -f training/compose.yml run --rm finetune_combined_stage1     # IAM + corrections (retraining target)
#
# Original (printed base, kept for reference):
#   docker compose -f training/compose.yml run --rm baseline
#   docker compose -f training/compose.yml run --rm finetune_iam
#   docker compose -f training/compose.yml run --rm finetune_corrections
#   docker compose -f training/compose.yml run --rm finetune_combined
#
# Recurring scheduler (fires the CANDIDATE service every INTERVAL_MIN minutes):
#   docker compose -f training/compose.yml up -d training_scheduler
#   docker compose -f training/compose.yml logs -f training_scheduler
#
# To change what the scheduler runs:
#   CANDIDATE=finetune_iam_stage1 INTERVAL_MIN=60 \
#       docker compose -f training/compose.yml up -d training_scheduler

services:
  _base: &training_base
    build:
      context: ..
      dockerfile: training/Dockerfile
    image: htr_trainer:latest
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: paperless_minio
    networks:
      - paperless_ml_net

  baseline:
    <<: *training_base
    command: ["--config", "/app/configs/baseline.yaml"]

  baseline_stage1:
    <<: *training_base
    command: ["--config", "/app/configs/baseline_stage1.yaml"]

  finetune_iam:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_iam.yaml"]

  finetune_stage1:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_stage1.yaml"]

  finetune_iam_stage1:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_iam_stage1.yaml"]

  finetune_corrections:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_corrections.yaml"]

  finetune_combined:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_combined.yaml"]

  finetune_combined_stage1:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_combined_stage1.yaml"]

  # ── Recurring training scheduler ─────────────────────────────────
  # A long-running daemon that fires the training pipeline periodically.
  # Uses the mounted docker socket to invoke `docker compose run` — the
  # standard pattern for docker-native schedulers.
  training_scheduler:
    build:
      context: ../training_scheduler
      dockerfile: Dockerfile
    image: training_scheduler:latest
    container_name: training_scheduler
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./compose.yml:/compose.yml:ro
    environment:
      # Demo: 60 min cadence (visible in video if you leave it running).
      # Production: set INTERVAL_MIN=1440 (daily) to align with the
      # typical cadence of user-correction accumulation.
      INTERVAL_MIN: ${INTERVAL_MIN:-60}
      CANDIDATE: ${CANDIDATE:-finetune_combined_stage1}
      COMPOSE_PROJECT: training
      COMPOSE_FILE: /compose.yml
    networks:
      - paperless_ml_net

networks:
  paperless_ml_net:
    external: true
