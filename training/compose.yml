# Trainer compose — one-shot training containers + recurring scheduler.
#
# Stage1-based runs (recommended for proper fine-tune demo):
#   docker compose -f training/compose.yml run --rm baseline_stage1
#   docker compose -f training/compose.yml run --rm finetune_stage1              # frozen, faster
#   docker compose -f training/compose.yml run --rm finetune_iam_stage1          # unfrozen, better
#   docker compose -f training/compose.yml run --rm finetune_combined_stage1     # IAM + corrections (retraining target)
#
# Original (printed base, kept for reference):
#   docker compose -f training/compose.yml run --rm baseline
#   docker compose -f training/compose.yml run --rm finetune_iam
#   docker compose -f training/compose.yml run --rm finetune_corrections
#   docker compose -f training/compose.yml run --rm finetune_combined
#
# Note: recurring retraining is handled by the airflow htr_retraining DAG
# (see ../airflow/dags/htr_training.py) — not by a separate docker scheduler.

services:
  _base: &training_base
    build:
      context: ..
      dockerfile: training/Dockerfile
    image: htr_trainer:latest
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: paperless_minio
    networks:
      - paperless_ml_net

  baseline:
    <<: *training_base
    command: ["--config", "/app/configs/baseline.yaml"]

  baseline_stage1:
    <<: *training_base
    command: ["--config", "/app/configs/baseline_stage1.yaml"]

  finetune_iam:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_iam.yaml"]

  finetune_stage1:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_stage1.yaml"]

  finetune_iam_stage1:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_iam_stage1.yaml"]

  finetune_corrections:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_corrections.yaml"]

  finetune_combined:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_combined.yaml"]

  finetune_combined_stage1:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_combined_stage1.yaml"]

networks:
  paperless_ml_net:
    external: true
