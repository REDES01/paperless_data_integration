# Trainer compose — one-shot training containers + recurring scheduler.
#
# One-shot usage (manual runs):
#   docker compose -f training/compose.yml run --rm baseline
#   docker compose -f training/compose.yml run --rm finetune_iam
#   docker compose -f training/compose.yml run --rm finetune_corrections
#   docker compose -f training/compose.yml run --rm finetune_combined
#
# Recurring scheduler (automated retraining, fires every INTERVAL_MIN):
#   docker compose -f training/compose.yml up -d training_scheduler
#   docker compose -f training/compose.yml logs -f training_scheduler
#
# The scheduler fires the CANDIDATE service via `docker compose run` on its
# schedule. It skips when a training container is already running, so manual
# runs + scheduled runs compose safely.

services:
  _base: &training_base
    build:
      context: ..
      dockerfile: training/Dockerfile
    image: htr_trainer:latest
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: paperless_minio
    networks:
      - paperless_ml_net

  baseline:
    <<: *training_base
    command: ["--config", "/app/configs/baseline.yaml"]

  finetune_iam:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_iam.yaml"]

  finetune_corrections:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_corrections.yaml"]

  finetune_combined:
    <<: *training_base
    command: ["--config", "/app/configs/finetune_combined.yaml"]

  # ── Recurring training scheduler ─────────────────────────────────
  # A long-running daemon that fires the training pipeline periodically.
  # Uses the mounted docker socket to invoke `docker compose run` — this is
  # the standard pattern for docker-native schedulers.
  training_scheduler:
    build:
      context: ../training_scheduler
      dockerfile: Dockerfile
    image: training_scheduler:latest
    container_name: training_scheduler
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount the compose file so the scheduler can use it. The path inside
      # the container matches COMPOSE_FILE in the Dockerfile default.
      - ./compose.yml:/compose.yml:ro
    environment:
      # For the demo: 60 min cadence (visible in video if you leave running).
      # For production use: set INTERVAL_MIN=1440 (daily).
      INTERVAL_MIN: ${INTERVAL_MIN:-60}
      CANDIDATE: ${CANDIDATE:-finetune_combined}
      COMPOSE_PROJECT: training
      COMPOSE_FILE: /compose.yml
    networks:
      - paperless_ml_net

networks:
  paperless_ml_net:
    external: true
