scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: ml-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["ml_gateway:8000"]
        labels: { service: ml-gateway }

  - job_name: drift-monitor
    metrics_path: /metrics
    static_configs:
      - targets: ["drift_monitor:8000"]
        labels: { service: drift-monitor }

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]
        labels: { service: qdrant }

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
